<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angular Highlight</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      background: linear-gradient(135deg, #dd0031, #c3002f);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #dd0031;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: white;
    }

    .header-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 1px;
    }

    .content {
      padding: 20px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid #0f3460;
    }

    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .toggle-label-main {
      font-size: 14px;
      font-weight: 500;
      color: #e0e0e0;
    }

    .toggle-label-sub {
      font-size: 11px;
      color: #888;
    }

    /* トグルスイッチ */
    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #444;
      border-radius: 26px;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #00c864;
    }

    input:checked + .slider:before {
      transform: translateX(22px);
    }

    .status-badge {
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      transition: all 0.3s;
    }

    .status-badge.on {
      background: rgba(0, 200, 100, 0.15);
      color: #00c864;
      border: 1px solid rgba(0, 200, 100, 0.3);
    }

    .status-badge.off {
      background: rgba(100, 100, 100, 0.15);
      color: #888;
      border: 1px solid rgba(100, 100, 100, 0.3);
    }

    .info {
      margin-top: 16px;
      padding: 12px 14px;
      background: #16213e;
      border-radius: 8px;
      border: 1px solid #0f3460;
      font-size: 11px;
      color: #888;
      line-height: 1.6;
    }

    .info-title {
      font-weight: 600;
      color: #aaa;
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green { background: #00c864; }
    .dot-blue { background: #4a9eff; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">A</div>
    <div>
      <div class="header-title">Angular Highlight</div>
      <div class="header-subtitle">Change Detection Visualizer</div>
    </div>
  </div>

  <div class="content">
    <div class="toggle-row">
      <div class="toggle-label">
        <span class="toggle-label-main">ハイライト表示</span>
        <span class="toggle-label-sub">CD 発生時にコンポーネントを光らせる</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="status-badge on" id="status">有効 - コンポーネントを監視中</div>

    <div class="info">
      <div class="info-title">対応方式</div>
      <div class="info-item">
        <div class="dot dot-green"></div>
        <span>Zone.js (Angular v2〜v17)</span>
      </div>
      <div class="info-item">
        <div class="dot dot-blue"></div>
        <span>Signals / Zoneless (Angular v16+)</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
