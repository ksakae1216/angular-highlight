<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angular Highlight</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      background: linear-gradient(135deg, #dd0031, #c3002f);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #dd0031;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: white;
    }

    .header-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 1px;
    }

    .content {
      padding: 20px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid #0f3460;
    }

    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .toggle-label-main {
      font-size: 14px;
      font-weight: 500;
      color: #e0e0e0;
    }

    .toggle-label-sub {
      font-size: 11px;
      color: #888;
    }

    /* トグルスイッチ */
    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #444;
      border-radius: 26px;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #00c864;
    }

    input:checked + .slider:before {
      transform: translateX(22px);
    }

    .status-badge {
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      transition: all 0.3s;
    }

    .status-badge.on {
      background: rgba(0, 200, 100, 0.15);
      color: #00c864;
      border: 1px solid rgba(0, 200, 100, 0.3);
    }

    .status-badge.off {
      background: rgba(100, 100, 100, 0.15);
      color: #888;
      border: 1px solid rgba(100, 100, 100, 0.3);
    }

    .info {
      margin-top: 16px;
      padding: 12px 14px;
      background: #16213e;
      border-radius: 8px;
      border: 1px solid #0f3460;
      font-size: 11px;
      color: #888;
      line-height: 1.6;
    }

    .info-title {
      font-weight: 600;
      color: #aaa;
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green { background: #00c864; }
    .dot-blue { background: #4a9eff; }

    .color-section {
      margin-top: 12px;
      background: #16213e;
      border-radius: 10px;
      border: 1px solid #0f3460;
      overflow: hidden;
    }

    .color-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
    }

    .color-row + .color-row {
      border-top: 1px solid #0f3460;
    }

    .color-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #ccc;
    }

    .color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .color-picker-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-hex {
      font-size: 11px;
      color: #888;
      font-family: monospace;
      width: 52px;
      text-align: right;
    }

    input[type="color"] {
      width: 32px;
      height: 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 0;
      background: none;
    }

    .reset-btn {
      margin-top: 8px;
      width: 100%;
      background: none;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #888;
      font-size: 11px;
      padding: 5px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .reset-btn:hover {
      color: #ccc;
      border-color: #444;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">A</div>
    <div>
      <div class="header-title">Angular Highlight</div>
      <div class="header-subtitle">Change Detection Visualizer</div>
    </div>
  </div>

  <div class="content">
    <div class="toggle-row">
      <div class="toggle-label">
        <span class="toggle-label-main" data-i18n="toggleLabel"></span>
        <span class="toggle-label-sub" data-i18n="toggleSub"></span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="status-badge on" id="status"></div>

    <div class="color-section">
      <div class="color-row">
        <div class="color-label">
          <div class="color-dot" id="dot-zone"></div>
          <span>Zone.js</span>
        </div>
        <div class="color-picker-wrap">
          <span class="color-hex" id="hex-zone"></span>
          <input type="color" id="color-zone">
        </div>
      </div>
      <div class="color-row">
        <div class="color-label">
          <div class="color-dot" id="dot-signal"></div>
          <span>Signals / Zoneless</span>
        </div>
        <div class="color-picker-wrap">
          <span class="color-hex" id="hex-signal"></span>
          <input type="color" id="color-signal">
        </div>
      </div>
    </div>
    <button class="reset-btn" id="reset-btn" data-i18n="resetBtn"></button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
