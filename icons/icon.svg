<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 背景: Angular レッド -->
  <rect width="128" height="128" rx="16" fill="#DD0031"/>

  <!-- ハイライト枠のイメージ（緑のボーダー） -->
  <rect x="14" y="14" width="100" height="100" rx="8"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>

  <!-- Angular の "A" シンボル（シールド形） -->
  <polygon points="64,22 96,34 91,84 64,98 37,84 32,34"
           fill="white" opacity="0.95"/>
  <polygon points="64,32 87,40 83,78 64,88 45,78 41,40"
           fill="#DD0031"/>

  <!-- "A" の文字 -->
  <text x="64" y="75" font-family="Arial, sans-serif" font-size="38"
        font-weight="900" fill="white" text-anchor="middle">A</text>

  <!-- 右下の緑のハイライトドット（"highlight" を表現） -->
  <circle cx="98" cy="98" r="16" fill="#00C864"/>
  <path d="M90 98 L96 104 L108 92" stroke="white" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
